site_name: 且翟子木的博客
site_description: 关于 Python、软件工程和编程技术的个人博客
site_author: float-life-of-dream
site_url: https://example.com/blog
repo_name: blog
repo_url: https://github.com/float-life-of-dream/blog
copyright: "Copyright © 2024 float-life-of-dream. All rights reserved."
edit_uri_template: "edit/main/{path}"

theme:
  name: material
  language: zh
  logo: images/logo.png
  favicon: images/favicon.ico
  include_search_page: false
  search_index_only: true
  palette:
    - scheme: default
      primary: light-green
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换至深色模式
    - scheme: slate
      primary: green
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换至浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - blog:
      blog_dir: blog
      blog_toc: true
      post_dir: posts
      archive: true
      archive_date_format: MMMM yyyy
      categories: true
      categories_toc: true
      authors: true
      pagination: true
      pagination_per_page: 5

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - footnotes
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 博客: blog/index.md
  - 项目: projects/index.md
  - 算法: algorithms/index.md
  - 技术栈: techstack/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/float-life-of-dream
      name: GitHub 主页
  analytics: {}
