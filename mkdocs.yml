site_name: My Programming Blog
site_description: A blog about programming, Python, and software development
site_author: liyao
site_url: https://example.com/blog

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - blog:
      blog_dir: blog
      blog_toc: true
      post_dir: posts
      archive: true
      archive_date_format: MMMM yyyy
      categories: true
      categories_toc: true
      authors: true
      pagination: true
      pagination_per_page: 5

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Blog: blog/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
      name: GitHub Profile
  analytics: {}
